services:
  - type: web
    name: task-manager-api
    runtime: node
    repo: https://github.com/Praveenkg02/Task-manager
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: "5001"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://frontend-praveenkg.vercel.app
